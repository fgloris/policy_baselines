defaults:
  - task: pusht_lowdim
  - _self_

name: train_direction_mag_mlp_lowdim
_target_: diffusion_policy.workspace.train_direction_mag_mlp_lowdim_workspace.TrainDirectionMagMLPLowdimWorkspace

obs_dim: ${task.obs_dim}
action_dim: ${task.action_dim}
keypoint_dim: ${task.keypoint_dim}
task_name: ${task.name}
exp_name: "mlp"

horizon: 16
n_obs_steps: 2
n_action_steps: 1
pred_action_steps: 8
n_latency_steps: 0
past_action_visible: False
keypoint_visible_rate: 1.0

# Override dataset padding because the policy is trained to predict pred_action_steps
# even though the environment executes only n_action_steps.
task:
  dataset:
    pad_after: ${eval:'${pred_action_steps}-1'}

policy:
  _target_: diffusion_policy.policy.direction_mag_mlp_lowdim_policy.DirectionMagMLPLowdimPolicy

  horizon: ${horizon}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  # Rollout execution length. The environment consumes only this many actions.
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  # Supervised prediction length. The network still predicts an 8-step chunk.
  pred_action_steps: ${pred_action_steps}
  n_obs_steps: ${n_obs_steps}

  # 512-MLP baseline
  num_dir_bins: 32
  hidden_dim: 512
  depth: 4
  activation: relu
  layer_norm: True
  dropout: 0.15

  # Loss = Gaussian soft CE + Gaussian-weighted per-bin magnitude/bias regression
  #      + (1 - Gaussian weight) magnitude regularization + vector reconstruction.
  # Each predicted step has 32 experts: direction logit + magnitude + direction bias.
  # All losses are computed in normalized action coordinates.
  dir_loss_weight: 1.0
  mag_loss_weight: 1.0
  bias_loss_weight: 0.3
  traj_loss_weight: 0.1
  # Regularize far-away experts with (1 - peak-normalized Gaussian weight).
  mag_all_reg_weight: 5.0e-2
  # Circular Gaussian sigma measured in direction-bin widths. With 32 bins,
  # one bin is 11.25 degrees; sigma=1.0 mainly trains the nearest few experts.
  gaussian_sigma_bins: 1.0
  # tanh(raw_bias) is multiplied by bias_range_bins * bin_width.
  # 1.0 lets adjacent experts correct by one full bin width.
  bias_range_bins: 1.0

  # Ignore direction/bias labels when normalized step length is too small.
  dir_eps: 1.0e-2
  # log target is log(1 + ||delta|| / mag_scale) in normalized action space.
  # The network predicts this value separately for each direction bin.
  mag_scale: 5.0e-2
  mag_head_init_bias: -2.0
  oa_step_convention: True

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 512
  num_workers: 1
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 512
  num_workers: 1
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-4

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 20000
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 8
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
